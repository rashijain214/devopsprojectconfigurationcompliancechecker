apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliance-checker
  labels:
    app: compliance-checker
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: compliance-checker
  template:
    metadata:
      labels:
        app: compliance-checker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: compliance-checker
          image: compliance-checker:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: reports
              mountPath: /app/reports
      volumes:
        - name: reports
          emptyDir: {}